<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>middaypuppy.exe - Uh oh!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
<link rel="apple-touch-icon" href="/images/puppyboypfp.png" />
<meta name="theme-color" content="#fff0f7" id="themeColorMeta" />

<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap");

*{ margin:0; padding:0; box-sizing:border-box; }

:root{
  --tail-rotate: 0deg;
  --tail-lift: 0px;
  --tail-scale: 1;
  --tail-glow: .72;
}

body{
  font-family:"Montserrat",sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.9), transparent 40%),
    radial-gradient(circle at 20% 20%, rgba(255,200,230,.4), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(200,230,255,.4), transparent 25%),
    linear-gradient(180deg,#fff4fb,#ffeaf6);
  overflow:hidden;
  color:#6d5a79;
}

.sparkles{
  position:absolute;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.9) 1.5px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);
  background-size:120px 120px, 160px 160px;
  animation: float 10s linear infinite;
  opacity:.6;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-20px); }
  100%{ transform:translateY(0); }
}

.card{
  background:rgba(255,255,255,.7);
  border:1px solid rgba(255,180,215,.35);
  border-radius:28px;
  padding:40px 32px;
  width:min(420px,90%);
  text-align:center;
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(255,182,215,.25);
  position:relative;
  z-index:2;
}

.title{
  font-weight:800;
  letter-spacing:.1em;
  font-size:1.4rem;
  color:#ffb6c1;
  text-shadow:0 0 14px rgba(255,190,230,.7);
}

.subtitle{
  margin-top:8px;
  font-size:.8rem;
  letter-spacing:.18em;
  color:rgba(120,100,140,.7);
}

.status{
  margin-top:28px;
  font-size:.95rem;
  font-weight:600;
}

.status span{
  color:#ff9ed1;
}

.puppy-loader{
  margin:26px auto 0;
  animation: puppyFloat 3.2s ease-in-out infinite;
}

.puppy-face{
  width:104px;
  height:104px;
  object-fit:cover;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.72);
  box-shadow:
    0 10px 28px rgba(255,182,215,.26),
    0 0 22px rgba(255,255,255,.55);
  background: rgba(255,255,255,.55);
}

@keyframes puppyFloat{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-4px); }
}

.msg{
  margin-top:20px;
  font-size:.85rem;
  color:rgba(120,100,140,.75);
}

.heart{
  margin-top:12px;
  font-size:1.4rem;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.2); }
}

/* Tail system */
.tail-widget{
  position:fixed;
  right:0;
  bottom:0;
  width:170px;
  height:190px;
  z-index:30;
  cursor:pointer;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:auto;
}

.tail-shell{
  position:absolute;
  right:-8px;
  bottom:-120px;
  width:100%;
  height:100%;
  transform-origin: 88% 100%;
  animation:
    tailPopIn .9s cubic-bezier(.2,.9,.2,1) forwards,
    tailPeek 3.6s ease-in-out infinite 1s;
}

.tail-glow{
  position:absolute;
  inset:28px 10px 10px 30px;
  border-radius:50%;
  background:
    radial-gradient(circle at 45% 55%,
      rgba(255,179,216,.28) 0%,
      rgba(255,210,235,.22) 28%,
      rgba(255,245,250,.18) 52%,
      transparent 76%);
  filter: blur(18px);
  opacity: var(--tail-glow);
  pointer-events:none;
  transition: opacity .18s ease;
}

.tail-art{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:bottom right;
  pointer-events:none;
  transform-origin: 78% 92%;
  transform:
    translateY(var(--tail-lift))
    rotate(var(--tail-rotate))
    scale(var(--tail-scale));
  animation:
    tailIdleSway 2.4s ease-in-out infinite,
    tailBreath 3.4s ease-in-out infinite;
  transition:
    transform .14s ease-out,
    filter .18s ease,
    opacity .18s ease;
  filter:
    drop-shadow(0 10px 18px rgba(255,182,215,.30))
    drop-shadow(0 0 16px rgba(255,225,238,.38));
}

.tail-widget:hover .tail-art{
  filter:
    drop-shadow(0 12px 24px rgba(255,182,215,.42))
    drop-shadow(0 0 22px rgba(255,230,240,.52));
}

.tail-spark{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,.95);
  box-shadow:
    0 0 10px rgba(255,255,255,.9),
    0 0 14px rgba(255,210,235,.65);
  opacity:.72;
  pointer-events:none;
  animation: sparkleFloat 2.8s ease-in-out infinite;
}

.tail-spark.s1{ right:102px; bottom:132px; animation-delay:0s; }
.tail-spark.s2{ right:42px; bottom:96px; animation-delay:.7s; width:6px; height:6px; }
.tail-spark.s3{ right:118px; bottom:60px; animation-delay:1.4s; width:5px; height:5px; }

.tail-widget.curious .tail-shell{
  animation:
    tailPopHold .25s ease forwards,
    tailCuriousBounce .55s ease-in-out infinite;
}

.tail-widget.curious .tail-art{
  animation:
    tailCuriousSway .55s ease-in-out infinite,
    tailBreath 2.2s ease-in-out infinite;
}

.tail-widget.dance .tail-shell{
  animation: tailDanceWrap .32s ease-in-out 3;
}

.tail-widget.dance .tail-art{
  animation:
    tailDance .32s ease-in-out 3,
    tailBreath .9s ease-in-out 3;
}

.tail-burst{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.tail-burst span{
  position:absolute;
  right:62px;
  bottom:54px;
  width:10px;
  height:10px;
  border-radius:50%;
  opacity:0;
  background: radial-gradient(circle, #fff 0%, #ffd6ee 55%, #ffeef6 100%);
  box-shadow:
    0 0 10px rgba(255,255,255,.8),
    0 0 16px rgba(255,182,215,.55);
}

.tail-widget.dance .tail-burst span:nth-child(1){ animation: burst1 .55s ease-out; }
.tail-widget.dance .tail-burst span:nth-child(2){ animation: burst2 .55s ease-out; }
.tail-widget.dance .tail-burst span:nth-child(3){ animation: burst3 .55s ease-out; }
.tail-widget.dance .tail-burst span:nth-child(4){ animation: burst4 .55s ease-out; }

@keyframes tailPopIn{
  from{ transform: translateY(130px) scale(.88); opacity:0; }
  65%{ transform: translateY(-10px) scale(1.03); opacity:1; }
  to{ transform: translateY(0) scale(1); opacity:1; bottom:0; }
}

@keyframes tailPeek{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-4px); }
}

@keyframes tailPopHold{
  from{ bottom:-120px; opacity:0; }
  to{ bottom:0; opacity:1; }
}

@keyframes tailIdleSway{
  0%,100%{ transform: translateY(var(--tail-lift)) rotate(calc(var(--tail-rotate) + 7deg)) scale(var(--tail-scale)); }
  50%{ transform: translateY(calc(var(--tail-lift) - 2px)) rotate(calc(var(--tail-rotate) + 18deg)) scale(var(--tail-scale)); }
}

@keyframes tailCuriousSway{
  0%,100%{ transform: translateY(calc(var(--tail-lift) - 1px)) rotate(calc(var(--tail-rotate) + 10deg)) scale(calc(var(--tail-scale) + .01)); }
  50%{ transform: translateY(calc(var(--tail-lift) - 6px)) rotate(calc(var(--tail-rotate) + 28deg)) scale(calc(var(--tail-scale) + .05)); }
}

@keyframes tailDance{
  0%{ transform: translateY(var(--tail-lift)) rotate(8deg) scale(1); }
  25%{ transform: translateY(calc(var(--tail-lift) - 6px)) rotate(30deg) scale(1.06); }
  50%{ transform: translateY(calc(var(--tail-lift) - 2px)) rotate(-4deg) scale(.98); }
  75%{ transform: translateY(calc(var(--tail-lift) - 8px)) rotate(26deg) scale(1.05); }
  100%{ transform: translateY(var(--tail-lift)) rotate(8deg) scale(1); }
}

@keyframes tailDanceWrap{
  0%,100%{ transform: translateY(0) scale(1.01); }
  50%{ transform: translateY(-8px) scale(1.06); }
}

@keyframes tailCuriousBounce{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-8px); }
}

@keyframes tailBreath{
  0%,100%{ filter: drop-shadow(0 10px 18px rgba(255,182,215,.30)) drop-shadow(0 0 16px rgba(255,225,238,.38)); }
  50%{ filter: drop-shadow(0 12px 22px rgba(255,182,215,.36)) drop-shadow(0 0 22px rgba(255,235,242,.46)); }
}

@keyframes sparkleFloat{
  0%,100%{ transform: translateY(0) scale(.9); opacity:.45; }
  50%{ transform: translateY(-8px) scale(1.1); opacity:.95; }
}

@keyframes burst1{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(-26px,-28px) scale(1.15); }
}
@keyframes burst2{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(18px,-34px) scale(1.1); }
}
@keyframes burst3{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(-18px,12px) scale(.95); }
}
@keyframes burst4{
  0%{ opacity:0; transform:translate(0,0) scale(.4); }
  20%{ opacity:1; }
  100%{ opacity:0; transform:translate(26px,6px) scale(.9); }
}

@media (max-width: 700px){
  .tail-widget{
    width:132px;
    height:150px;
  }
}
</style>
</head>

<body>
<div class="sparkles"></div>

<div class="card">
  <div class="title">middaypuppy.exe</div>
  <div class="subtitle">SYSTEM: gently restoring</div>

  <div class="status">
    please wait… <span>new stuffs incoming!</span>
  </div>

  <div class="puppy-loader">
    <img src="/images/puppyboypfp.png" class="puppy-face" alt="middaypuppy avatar" />
  </div>

  <div class="msg" id="msg">
    we will be here soon ♡ please check back later
  </div>

  <div class="heart">♡</div>
</div>

<div class="tail-widget" id="tail" aria-label="wagging puppy tail">
  <div class="tail-shell">
    <div class="tail-glow"></div>
    <img src="/images/puppy-tail-pastel.png" alt="" class="tail-art" />
    <div class="tail-spark s1"></div>
    <div class="tail-spark s2"></div>
    <div class="tail-spark s3"></div>
    <div class="tail-burst">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<script>
document.getElementById("msg").textContent =
  "we will be here soon ♡ please check back later";

const tail = document.getElementById("tail");
const root = document.documentElement;

let danceTimeout = null;
let proximityActive = false;

function setTailState(rotation, lift, scale, glow, curious){
  root.style.setProperty("--tail-rotate", rotation + "deg");
  root.style.setProperty("--tail-lift", lift + "px");
  root.style.setProperty("--tail-scale", scale);
  root.style.setProperty("--tail-glow", glow);

  tail.classList.toggle("curious", curious);
}

function resetTail(){
  proximityActive = false;
  setTailState(0, 0, 1, .72, false);
}

document.addEventListener("mousemove", (event) => {
  const rect = tail.getBoundingClientRect();
  const cx = rect.left + rect.width * 0.72;
  const cy = rect.top + rect.height * 0.78;

  const dx = event.clientX - cx;
  const dy = event.clientY - cy;
  const distance = Math.hypot(dx, dy);

  const reactRadius = 240;
  if (distance > reactRadius) {
    if (proximityActive) resetTail();
    return;
  }

  proximityActive = true;

  const t = 1 - Math.min(distance / reactRadius, 1);
  const rotate = Math.max(-4, Math.min(14, (dx / 28) * t));
  const lift = -Math.round(10 * t);
  const scale = 1 + (0.05 * t);
  const glow = 0.72 + (0.38 * t);
  const curious = t > 0.18;

  setTailState(rotate, lift, scale, glow, curious);
});

document.addEventListener("mouseleave", resetTail);

tail.addEventListener("mouseenter", () => {
  setTailState(6, -8, 1.05, 1.0, true);
});

tail.addEventListener("mouseleave", () => {
  if (!proximityActive) resetTail();
});

tail.addEventListener("click", () => {
  tail.classList.remove("dance");
  void tail.offsetWidth;
  tail.classList.add("dance");

  clearTimeout(danceTimeout);
  danceTimeout = setTimeout(() => {
    tail.classList.remove("dance");
  }, 950);
});
</script>

</body>
</html>
