<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>middaypuppy.exe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/css/middaypuppy-bio.css" />
  <link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
  <link rel="apple-touch-icon" href="/images/puppyboypfp.png" />
  <meta name="theme-color" content="#fff3f8" id="themeColorMeta" />
</head>

<body>
  <div class="overlay overlay-particles" aria-hidden="true"></div>
  <div class="overlay overlay-vignette" aria-hidden="true"></div>

  <header class="hud-top">
    <div class="hud-brand">
      <div class="hud-title glitch" id="siteTitle" data-text="middaypuppy.exe">
        middaypuppy.exe
      </div>
      <div class="hud-sub" id="siteSubtitle">
        BIO DASHBOARD • SIGNAL STABLE • HEART WARM
      </div>
    </div>

    <nav class="hud-nav" id="siteNav" aria-label="Bio navigation"></nav>

    <div class="hud-stats" id="topStats"></div>
  </header>

  <main class="grid">
    <section class="panel profile">
      <div class="panel-head">
        <span id="profilePanelTitle">USER PROFILE</span>
        <span class="chip" id="profileChip">ONLINE</span>
      </div>

      <div class="avatar">
        <img
          class="avatar-img"
          id="avatarImg"
          src="/images/puppyboypfp.png"
          alt="middaypuppy avatar"
          onerror="this.style.display='none'; this.parentElement.classList.add('avatar-fallback');"
        />
        <div class="avatar-silhouette"></div>
      </div>

      <div class="profile-name" id="profileName">MiddayPuppy.exe</div>
      <div class="profile-meta" id="profileMeta"></div>

      <div class="bars" id="profileBars"></div>

      <div class="divider"></div>

      <div class="mini-title" id="loadoutTitle">LOADOUT</div>
      <ul class="list" id="loadoutList"></ul>
    </section>

    <section class="panel quest">
      <div class="panel-head">
        <span id="bioPanelTitle">BIO LOG</span>
        <span class="chip pink" id="bioChip">LIVE</span>
      </div>

      <ul class="quests" id="bioLogList"></ul>

      <div class="divider"></div>

      <div class="mini-title" id="vibesTitle">VIBES</div>
      <div class="chips-row" id="vibesList"></div>
    </section>

    <section class="panel party">
      <div class="panel-head">
        <span id="statsPanelTitle">Stats</span>
        <span class="chip pink" id="statsPanelChip">soft</span>
      </div>

      <div id="statsCards"></div>
    </section>

    <section class="panel battle">
      <div class="panel-head">
        <span id="statusPanelTitle">STATUS REPORT</span>
        <span class="chip" id="statusPanelChip">CURRENT</span>
      </div>

      <ul class="list" id="statusReportList"></ul>
    </section>

    <section class="panel syslog">
      <div class="panel-head">
        <span id="systemLogTitle">SYSTEM LOG</span>
        <span class="chip pink" id="systemLogChip">RUNNING</span>
      </div>

      <div class="terminal" id="systemLogLines"></div>
    </section>
  </main>

  <div class="sao-toast show">
    <div class="sao-toast-header" id="toastHeader">SYSTEM</div>
    <div class="sao-toast-body">
      <span class="type" id="toastType"></span>
      <span class="caret">▍</span>
    </div>
    <button class="sao-toast-close">✕</button>
    <div class="sao-toast-progress"></div>
  </div>

  <script>
  const DATA_URL = "/data/middaypuppy.json";

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function setText(id,val){
    const el=document.getElementById(id);
    if(el) el.textContent=val;
  }

  function setHTML(id,val){
    const el=document.getElementById(id);
    if(el) el.innerHTML=val;
  }

  function renderSimpleList(id,items){
    const list=document.getElementById(id);
    list.innerHTML="";
    items.forEach(i=>{
      const li=document.createElement("li");
      li.textContent=i;
      list.appendChild(li);
    });
  }

  function renderBio(entries){
    const list=document.getElementById("bioLogList");
    list.innerHTML="";
    entries.forEach(e=>{
      const li=document.createElement("li");
      li.innerHTML=`<span class="q-dot"></span>${escapeHtml(e.text)}<span class="tag">${e.tag}</span>`;
      list.appendChild(li);
    });
  }

  function renderVibes(vibes){
    const wrap=document.getElementById("vibesList");
    wrap.innerHTML="";
    vibes.forEach(v=>{
      const span=document.createElement("span");
      span.className="soft-chip";
      span.textContent=v;
      wrap.appendChild(span);
    });
  }

  function renderLog(lines){
    const wrap=document.getElementById("systemLogLines");
    wrap.innerHTML="";
    lines.forEach(l=>{
      if(l.type==="gap"){
        const g=document.createElement("div");
        g.className="term-gap";
        wrap.appendChild(g);
        return;
      }
      const row=document.createElement("div");
      row.className="term-line";
      row.innerHTML=`<span class="term-time">${l.time}</span>${l.message}`;
      wrap.appendChild(row);
    });
  }

  fetch(DATA_URL).then(r=>r.json()).then(data=>{

    setText("siteTitle",data.header.title);
    setText("siteSubtitle",data.header.subtitle);

    setText("profileName",data.profile.name);
    setHTML("profileMeta",data.profile.metaHtml);

    renderSimpleList("loadoutList",data.profile.loadout);
    renderBio(data.bio.entries);
    renderVibes(data.bio.vibes);
    renderSimpleList("statusReportList",data.statusReport.items);
    renderLog(data.systemLog.lines);

    document.getElementById("toastHeader").textContent=data.toast.header;
    document.getElementById("toastType").textContent=data.toast.line;

  });
  </script>

</body>
</html>
