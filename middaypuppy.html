<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>middaypuppy.exe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="/css/middaypuppy-bio.css" />
<link rel="icon" href="/images/puppyboypfp.png" />
<meta name="theme-color" content="#fff3f8" id="themeColorMeta" />
</head>

<body>

<!-- OVERLAYS (MIDNIGHT SYSTEM) -->
<div class="overlay overlay-particles" aria-hidden="true"></div>
<div class="overlay overlay-vignette" aria-hidden="true"></div>

<header class="hud-top">
  <div class="hud-brand">
    <div class="hud-title glitch" id="siteTitle" data-text="middaypuppy.exe">middaypuppy.exe</div>
    <div class="hud-sub" id="siteSubtitle"></div>
  </div>

  <nav class="hud-nav" id="siteNav"></nav>
  <div class="hud-stats" id="topStats"></div>
</header>

<main class="grid">

<!-- PROFILE -->
<section class="panel profile">
  <div class="panel-head">
    <span id="profilePanelTitle">USER PROFILE</span>
    <span class="chip" id="profileChip">ONLINE</span>
  </div>

  <div class="avatar">
    <img id="avatarImg" class="avatar-img"
      src="/images/puppyboypfp.png"
      onerror="this.style.display='none'; this.parentElement.classList.add('avatar-fallback');"
    />
    <div class="avatar-silhouette"></div>
  </div>

  <div class="profile-name" id="profileName"></div>
  <div class="profile-meta" id="profileMeta"></div>

  <div class="bars" id="profileBars"></div>

  <div class="divider"></div>

  <div class="mini-title" id="loadoutTitle">LOADOUT</div>
  <ul class="list" id="loadoutList"></ul>
</section>

<!-- BIO -->
<section class="panel quest">
  <div class="panel-head">
    <span id="bioPanelTitle">BIO LOG</span>
    <span class="chip pink" id="bioChip">LIVE</span>
  </div>

  <ul class="quests" id="bioLogList"></ul>

  <div class="divider"></div>

  <div class="mini-title" id="vibesTitle">VIBES</div>
  <div class="chips-row" id="vibesList"></div>
</section>

<!-- STATS (MIDNIGHT STRUCTURE RESTORED) -->
<section class="panel party">
  <div class="panel-head">
    <span id="statsPanelTitle">Stats</span>
    <span class="chip pink" id="statsPanelChip">soft</span>
  </div>

  <div id="statsCards"></div>
</section>

<!-- STATUS -->
<section class="panel battle">
  <div class="panel-head">
    <span id="statusPanelTitle">STATUS REPORT</span>
    <span class="chip" id="statusPanelChip">CURRENT</span>
  </div>

  <ul class="list" id="statusReportList"></ul>
</section>

<!-- SYSTEM LOG -->
<section class="panel syslog">
  <div class="panel-head">
    <span id="systemLogTitle">SYSTEM LOG</span>
    <span class="chip pink" id="systemLogChip">RUNNING</span>
  </div>

  <div class="terminal" id="systemLogLines" aria-label="System log"></div>
</section>

</main>

<!-- TOAST (MIDNIGHT EXACT) -->
<div id="toast" class="sao-toast">
  <div class="sao-toast-header" id="toastHeader">SYSTEM</div>

  <div class="sao-toast-body">
    <span id="toastType"></span><span class="caret">▍</span>
  </div>

  <button class="sao-toast-close">✕</button>
  <div class="sao-toast-progress"></div>
</div>

<script>
const DATA_URL = "/data/middaypuppy.json";

/* HELPERS */
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function setHTML(id,v){const el=document.getElementById(id);if(el)el.innerHTML=v;}

/* THEME */
function applyTheme(theme){
  const root=document.documentElement;
  Object.entries(theme).forEach(([k,v])=>{
    root.style.setProperty(`--${k}`,v);
  });

  const meta=document.getElementById("themeColorMeta");
  if(meta && theme.themeColor){
    meta.setAttribute("content",theme.themeColor);
  }
}

/* NAV */
function renderNav(nav){
  const el=document.getElementById("siteNav");
  el.innerHTML="";
  nav.forEach(n=>{
    el.innerHTML+=`<a class="hud-link ${n.active?"active":""}" href="${n.href}">${n.label}</a>`;
  });
}

/* STATS */
function renderTopStats(stats){
  const el=document.getElementById("topStats");
  el.innerHTML="";
  stats.forEach(s=>{
    el.innerHTML+=`<div class="stat">${s.label} <b>${s.value}</b></div>`;
  });
}

/* PROFILE BARS */
function renderBars(bars){
  const el=document.getElementById("profileBars");
  el.innerHTML="";
  bars.forEach((b,i)=>{
    const wrap=document.createElement("div");
    wrap.className="bar-wrap";

    wrap.innerHTML=`
      <div class="bar-label">${b.label}</div>
      <div class="bar"><div class="fill" style="width:0%"></div></div>
      <div class="bar-value">${b.value}</div>
    `;

    el.appendChild(wrap);

    setTimeout(()=>{
      wrap.querySelector(".fill").style.width=b.percent+"%";
    },120+i*100);
  });
}

/* LIST */
function renderList(id,items){
  const el=document.getElementById(id);
  el.innerHTML="";
  items.forEach(i=>{
    const li=document.createElement("li");
    li.textContent=i;
    el.appendChild(li);
  });
}

/* BIO */
function renderBio(entries){
  const el=document.getElementById("bioLogList");
  el.innerHTML="";
  entries.forEach(e=>{
    el.innerHTML+=`
      <li>
        <span class="q-dot"></span>
        ${e.text}
        <span class="tag ${e.tagClass||""}">${e.tag}</span>
      </li>`;
  });
}

/* VIBES */
function renderVibes(vibes){
  const el=document.getElementById("vibesList");
  el.innerHTML="";
  vibes.forEach(v=>{
    el.innerHTML+=`<span class="soft-chip">${v}</span>`;
  });
}

/* STATS CARDS (MIDNIGHT STYLE) */
function renderStats(cards){
  const el=document.getElementById("statsCards");
  el.innerHTML="";
  cards.forEach((c,i)=>{
    el.innerHTML+=`
      <div class="member">
        <div class="pfp pfp${i+1}"></div>
        <div>
          <div class="m-name">${c.name} <span class="lvl">${c.level}</span></div>
          <div class="m-bar"><div class="m-fill" style="width:${c.percent}%"></div></div>
          <div class="m-sub">${c.subtext}</div>
        </div>
      </div>`;
  });
}

/* LOG */
function renderLog(lines){
  const el=document.getElementById("systemLogLines");
  el.innerHTML="";
  lines.forEach(l=>{
    if(l.type==="gap"){el.innerHTML+=`<div class="term-gap"></div>`;return;}
    el.innerHTML+=`
      <div class="term-line">
        <span class="term-time">${l.time}</span>
        ${l.message}
      </div>`;
  });
}

/* TOAST */
function runTypingToast(line){
  const el=document.getElementById("toastType");
  let i=0;
  function type(){
    el.textContent=line.slice(0,i++);
    if(i<=line.length)setTimeout(type,20);
  }
  type();
}

function setupToast(){
  const toast=document.getElementById("toast");
  const close=toast.querySelector(".sao-toast-close");
  const progress=toast.querySelector(".sao-toast-progress");

  requestAnimationFrame(()=>toast.classList.add("show"));

  if(progress){
    progress.style.animation="toastTimer 8s linear forwards";
  }

  const timer=setTimeout(()=>{
    toast.classList.remove("show");
    setTimeout(()=>toast.remove(),250);
  },8000);

  close.onclick=()=>{
    clearTimeout(timer);
    toast.classList.remove("show");
    setTimeout(()=>toast.remove(),250);
  };
}

/* LOAD */
fetch(DATA_URL).then(r=>r.json()).then(data=>{

  applyTheme(data.theme);

  const title=document.getElementById("siteTitle");
  title.textContent=data.header.title;
  title.setAttribute("data-text",data.header.title);

  setText("siteSubtitle",data.header.subtitle);
  renderNav(data.header.nav);
  renderTopStats(data.header.stats);

  setText("profileName",data.profile.name);
  setHTML("profileMeta",data.profile.metaHtml);

  document.getElementById("avatarImg").src=data.profile.avatar.src;

  renderBars(data.profile.bars);
  renderList("loadoutList",data.profile.loadout);

  renderBio(data.bio.entries);
  renderVibes(data.bio.vibes);

  renderStats(data.statsPanel.cards);

  renderList("statusReportList",data.statusReport.items);

  renderLog(data.systemLog.lines);

  setText("toastHeader",data.toast.header);
  runTypingToast(data.toast.line);
  setupToast();

});
</script>

</body>
</html>
