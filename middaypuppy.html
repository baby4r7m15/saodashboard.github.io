<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>middaypuppy.exe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="/css/middaypuppy-bio.css" />

  <!-- ICON -->
  <link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
  <link rel="apple-touch-icon" href="/images/puppyboypfp.png" />

  <meta name="theme-color" content="#fff0f7" />
</head>

<body>

<div class="overlay overlay-particles"></div>
<div class="overlay overlay-vignette"></div>

<header class="hud-top">
  <div class="hud-brand">
    <div class="hud-title glitch" data-text="middaypuppy.exe">middaypuppy.exe</div>
    <div class="hud-sub">SAFE MODE • SUNBEAM STABLE • AFFECTION RESTORED</div>
  </div>

  <nav class="hud-nav"></nav>
  <div class="hud-stats"></div>
</header>

<main class="grid">

  <section class="panel profile">
    <div class="panel-head">
      <span>USER PROFILE</span>
      <span class="chip">ONLINE</span>
    </div>

    <div class="avatar">
      <img class="avatar-img" src="/images/puppyboypfp.png" />
    </div>

    <h1 id="profileName">loading...</h1>
    <p id="profileMeta"></p>

    <div id="profileBars"></div>

    <ul id="loadoutList"></ul>
  </section>

  <section class="panel bio">
    <div class="panel-head">
      <span>BIO LOG</span>
    </div>

    <ul id="bioEntries"></ul>
    <div id="vibesTags"></div>
  </section>

  <section class="panel stats-panel">
    <div class="panel-head">
      <span>Stats</span>
    </div>

    <div id="statsCards"></div>
  </section>

  <section class="panel report">
    <div class="panel-head">
      <span>STATUS REPORT</span>
    </div>

    <ul id="reportItems"></ul>
  </section>

  <section class="panel terminal-panel">
    <div class="panel-head">
      <span>SYSTEM LOG</span>
    </div>

    <div id="systemLog"></div>
  </section>

</main>

<!-- TOAST -->
<div class="sao-toast" id="saoToast">
  <div class="sao-toast-head">
    <span id="toastHeader">SYSTEM</span>
    <button class="sao-toast-close">✕</button>
  </div>

  <div class="sao-toast-body">
    <span id="toastType" class="typing"></span>
  </div>

  <div class="sao-toast-progress"></div>
</div>

<script>
const DATA_URL = "/data/middaypuppy.json";

/* SAFE HELPERS */
function setText(id,val){
  const el=document.getElementById(id);
  if(el) el.textContent=val || "";
}

function setHTML(id,val){
  const el=document.getElementById(id);
  if(el) el.innerHTML=val || "";
}

/* RENDER */
function renderList(id,arr){
  const el=document.getElementById(id);
  if(!el) return;
  el.innerHTML = (arr||[]).map(i=>`<li>${i}</li>`).join("");
}

function renderBars(arr){
  const el=document.getElementById("profileBars");
  if(!el) return;

  el.innerHTML = (arr||[]).map(b=>`
    <div class="bar">
      <span class="bar-fill" style="width:${b.percent}%"></span>
    </div>
  `).join("");
}

/* TOAST */
function runTyping(text){
  const el=document.getElementById("toastType");
  let i=0;

  function type(){
    if(i<text.length){
      el.textContent+=text[i++];
      setTimeout(type,24);
    }
  }

  type();
}

function startToast(){
  const toast=document.getElementById("saoToast");
  const bar=toast.querySelector(".sao-toast-progress");

  toast.classList.add("show");

  bar.style.animation="none";
  bar.offsetHeight;
  bar.style.animation="toastTimer 8s linear forwards";

  setTimeout(()=>toast.remove(),8000);
}

/* INIT */
async function init(){
  try{
    const res = await fetch(DATA_URL);

    if(!res.ok) throw new Error("JSON not found");

    const data = await res.json();

    setText("profileName",data.profile?.name);
    setHTML("profileMeta",data.profile?.metaHtml);

    renderBars(data.profile?.bars);
    renderList("loadoutList",data.profile?.loadout);
    renderList("bioEntries",data.bio?.entries?.map(e=>e.text));
    renderList("reportItems",data.statusReport?.items);

    setText("toastHeader",data.toast?.header);
    runTyping(data.toast?.line || "system online...");
  }
  catch(err){
    console.error("JSON LOAD FAILED:", err);

    // fallback so page still works
    setText("profileName","middaypuppy.exe");
    runTyping("failed to load data.json... but i'm still here ♡");
  }

  startToast();
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
