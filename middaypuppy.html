<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>middaypuppy.exe – safe mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/middaypuppy-bio.css" />
  <link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
  <link rel="apple-touch-icon" href="/images/puppyboypfp.png" />
  <meta name="theme-color" content="#fff0f7" id="themeColorMeta" />
</head>
<body>
  <div class="overlay overlay-rain" aria-hidden="true"></div>
  <div class="overlay overlay-particles" aria-hidden="true"></div>
  <div class="overlay overlay-vignette" aria-hidden="true"></div>

  <header class="hud-top">
    <div class="hud-brand">
      <div class="hud-title glitch" id="siteTitle" data-text="middaypuppy.exe">middaypuppy.exe</div>
      <div class="hud-sub" id="siteSubtitle">SAFE MODE • SUNBEAM STABLE • AFFECTION RESTORED</div>
    </div>

    <nav class="hud-nav" id="siteNav" aria-label="Bio navigation"></nav>
    <div class="hud-stats" id="topStats"></div>
  </header>

  <main class="grid">
    <section class="panel profile">
      <div class="panel-head">
        <span id="profilePanelTitle">USER PROFILE</span>
        <span class="chip" id="profileChip">ONLINE</span>
      </div>

      <div class="avatar">
        <img
          class="avatar-img"
          id="avatarImg"
          src="/images/puppyboypfp.png"
          alt="middaypuppy.exe avatar"
        />
      </div>

      <h1 class="profile-name" id="profileName">MIDDAYPUPPY.EXE</h1>
      <p class="profile-meta" id="profileMeta">Build: daylight • Level: 21 • Status: softly healing</p>

      <div class="bars" id="profileBars"></div>

      <div class="subpanel">
        <div class="subpanel-title" id="loadoutTitle">LOADOUT</div>
        <ul class="loadout-list" id="loadoutList"></ul>
      </div>
    </section>

    <section class="panel bio">
      <div class="panel-head">
        <span id="bioPanelTitle">BIO LOG</span>
        <span class="chip" id="bioChip">LIVE</span>
      </div>

      <ul class="bio-list" id="bioEntries"></ul>

      <div class="subpanel">
        <div class="subpanel-title" id="vibesTitle">VIBES</div>
        <div class="tags" id="vibesTags"></div>
      </div>
    </section>

    <section class="panel stats-panel">
      <div class="panel-head">
        <span id="statsPanelTitle">Stats</span>
        <span class="chip" id="statsChip">3</span>
      </div>

      <div class="stats-grid" id="statsCards"></div>
    </section>

    <section class="panel report">
      <div class="panel-head">
        <span id="reportPanelTitle">STATUS REPORT</span>
        <span class="chip" id="reportChip">LAST 24H</span>
      </div>

      <ul class="report-list" id="reportItems"></ul>
    </section>

    <section class="panel terminal-panel">
      <div class="panel-head">
        <span id="systemPanelTitle">SYSTEM LOG</span>
        <span class="chip" id="systemChip">STREAMING</span>
      </div>

      <div class="terminal" id="systemLog"></div>
    </section>
  </main>

  <div class="sao-toast" id="saoToast" role="status" aria-live="polite">
    <div class="sao-toast-head">
      <span id="toastHeader">SYSTEM</span>
      <button class="sao-toast-close" type="button" aria-label="Close system status">✕</button>
    </div>
    <div class="sao-toast-body">
      <span class="toast-cursor">▍</span>
      <span id="toastType"></span>
    </div>
    <div class="sao-toast-progress"></div>
  </div>

  <script>
    const DATA_URL = "/data/middaypuppy.json";

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el && value !== undefined && value !== null) el.textContent = value;
    }

    function setHTML(id, value) {
      const el = document.getElementById(id);
      if (el && value !== undefined && value !== null) el.innerHTML = value;
    }

    function applyTheme(theme) {
      if (!theme) return;

      const root = document.documentElement;
      const themeMap = {
        bg: "--bg",
        bg2: "--bg2",
        panel: "--panel",
        panel2: "--panel2",
        cyan: "--cyan",
        cyan2: "--cyan2",
        blue: "--blue",
        violet: "--violet",
        purple: "--purple",
        pink: "--pink",
        pink2: "--pink2",
        line: "--line",
        line2: "--line2",
        text: "--text",
        muted: "--muted",
        shadow: "--shadow",
        titleGlow: "--title-glow",
        glitchTop: "--glitch-top",
        glitchBottom: "--glitch-bottom"
      };

      Object.entries(themeMap).forEach(([key, cssVar]) => {
        if (theme[key]) root.style.setProperty(cssVar, theme[key]);
      });

      if (theme.themeColor) {
        const meta = document.getElementById("themeColorMeta");
        if (meta) meta.setAttribute("content", theme.themeColor);
      }
    }

    function renderNav(items = []) {
      const nav = document.getElementById("siteNav");
      if (!nav) return;

      nav.innerHTML = items
        .map(
          (item) => `
            <a class="hud-link${item.active ? " active" : ""}" href="${escapeHtml(item.href)}">
              ${escapeHtml(item.label)}
            </a>
          `
        )
        .join("");
    }

    function renderTopStats(items = []) {
      const wrap = document.getElementById("topStats");
      if (!wrap) return;

      wrap.innerHTML = items
        .map(
          (item) => `
            <div class="hud-stat">
              <span class="hud-stat-label">${escapeHtml(item.label)}</span>
              <span class="hud-stat-value">${escapeHtml(item.value)}</span>
            </div>
          `
        )
        .join("");
    }

    function renderBars(items = []) {
      const wrap = document.getElementById("profileBars");
      if (!wrap) return;

      wrap.innerHTML = items
        .map(
          (item) => `
            <div class="bar-row">
              <div class="bar-meta">
                <span>${escapeHtml(item.label)}</span>
                <span>${Number(item.percent) || 0}%</span>
              </div>
              <div class="bar">
                <span class="bar-fill ${escapeHtml(item.fillClass || "")}" style="width:${Number(item.percent) || 0}%"></span>
              </div>
            </div>
          `
        )
        .join("");
    }

    function renderList(id, items = []) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = items.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function renderVibes(items = []) {
      const el = document.getElementById("vibesTags");
      if (!el) return;
      el.innerHTML = items.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("");
    }

    function renderStatsCards(items = []) {
      const el = document.getElementById("statsCards");
      if (!el) return;

      el.innerHTML = items
        .map(
          (item) => `
            <article class="stat-card">
              <div class="stat-label">${escapeHtml(item.label)}</div>
              <div class="stat-value">${escapeHtml(item.value)}</div>
            </article>
          `
        )
        .join("");
    }

    function renderSystemLog(lines = []) {
      const el = document.getElementById("systemLog");
      if (!el) return;
      el.innerHTML = lines.map((line) => `<div class="terminal-line">${escapeHtml(line)}</div>`).join("");
    }

    function runTypingToast(text = "") {
      const target = document.getElementById("toastType");
      if (!target) return;

      target.textContent = "";
      let i = 0;

      const tick = () => {
        if (i <= text.length) {
          target.textContent = text.slice(0, i);
          i += 1;
          setTimeout(tick, 24);
        }
      };

      tick();
    }

    function setupToastTimer() {
      const toast = document.getElementById("saoToast");
      if (!toast) return;

      const closeBtn = toast.querySelector(".sao-toast-close");
      const progress = toast.querySelector(".sao-toast-progress");

      requestAnimationFrame(() => toast.classList.add("show"));

      let autoClose = setTimeout(() => {
        if (progress) progress.style.animation = "none";
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 220);
      }, 7000);

      if (closeBtn) {
        closeBtn.addEventListener("click", () => {
          clearTimeout(autoClose);
          if (progress) progress.style.animation = "none";
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 220);
        });
      }
    }

    async function loadBioData() {
      try {
        const response = await fetch(DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`Failed to load ${DATA_URL}: ${response.status}`);

        const data = await response.json();

        applyTheme(data.theme);
        document.title = data.head.title || document.title;

        const siteTitle = document.getElementById("siteTitle");
        siteTitle.textContent = data.header.title;
        siteTitle.setAttribute("data-text", data.header.title);

        setText("siteSubtitle", data.header.subtitle);
        renderNav(data.header.nav);
        renderTopStats(data.header.stats);

        setText("profilePanelTitle", data.profile.panelTitle);
        setText("profileChip", data.profile.panelChip);

        const avatarImg = document.getElementById("avatarImg");
        if (avatarImg && data.profile.avatar) {
          avatarImg.src = data.profile.avatar.src;
          avatarImg.alt = data.profile.avatar.alt || "";
        }

        setText("profileName", data.profile.name);
        setHTML("profileMeta", data.profile.metaHtml);
        renderBars(data.profile.bars);
        setText("loadoutTitle", data.profile.loadoutTitle);
        renderList("loadoutList", data.profile.loadout);

        setText("bioPanelTitle", data.bio.panelTitle);
        setText("bioChip", data.bio.panelChip);
        renderList("bioEntries", data.bio.entries);
        setText("vibesTitle", data.bio.vibesTitle);
        renderVibes(data.bio.vibes);

        setText("statsPanelTitle", data.statsPanel.panelTitle);
        setText("statsChip", data.statsPanel.panelChip);
        renderStatsCards(data.statsPanel.cards);

        setText("reportPanelTitle", data.statusReport.panelTitle);
        setText("reportChip", data.statusReport.panelChip);
        renderList("reportItems", data.statusReport.items);

        setText("systemPanelTitle", data.systemLog.panelTitle);
        setText("systemChip", data.systemLog.panelChip);
        renderSystemLog(data.systemLog.lines);

        setText("toastHeader", data.toast.header);
        runTypingToast(data.toast.line);
      } catch (error) {
        console.error(error);
        setText("toastType", "failed to load middaypuppy.json");
      }
    }

    setupToastTimer();
    loadBioData();
  </script>
</body>
</html>
