<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>middaypuppy.exe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/css/style.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#FCFBF4;
  --pink:#F6D6E6;
  --accent:#FF9ECB;
  --peach:#FFDCCF;
  --text:#5c4b56;
}

body{
  font-family:"Montserrat",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, var(--pink), transparent),
    radial-gradient(circle at 80% 60%, var(--peach), transparent),
    var(--bg);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CARD */
.card{
  width:900px;
  background:white;
  border-radius:24px;
  padding:24px;
  box-shadow:0 20px 50px rgba(255,180,220,.25);
  display:grid;
  grid-template-columns:260px 1fr;
  gap:24px;
}

/* LEFT */
.profile{
  text-align:center;
}

.profile img{
  width:100%;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(255,180,220,.3);
}

.name{
  font-weight:800;
  margin-top:12px;
}

.meta{
  font-size:12px;
  color:#9a7d8c;
}

/* RIGHT */
.section{
  margin-bottom:18px;
}

.title{
  font-weight:800;
  margin-bottom:8px;
  color:var(--accent);
}

/* LIST */
.list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:#FCFBF4;
  border-radius:12px;
  padding:10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
}

/* TAGS */
.tags{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.tag{
  background:var(--pink);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}
</style>

</head>

<body>

<div class="card">

  <div class="profile">
    <img src="/images/puppyboypfp.png">
    <div class="name">MiddayPuppy.exe</div>
    <div class="meta">warm • soft • safe</div>
  </div>

  <div>

    <div class="section">
      <div class="title">BIO LOG</div>
      <div class="list">
        <div class="item">middaypuppy.exe has logged in</div>
        <div class="item">sunlight detected ☁</div>
        <div class="item">warmth spreading through system</div>
        <div class="item">you are safe here</div>
      </div>
    </div>

    <div class="section">
      <div class="title">VIBES</div>
      <div class="tags">
        <div class="tag">☁ soft</div>
        <div class="tag">☀ warm</div>
        <div class="tag">♡ safe</div>
        <div class="tag">🫧 calm</div>
      </div>
    </div>

    <div class="section">
      <div class="title">STATUS</div>
      <div class="list">
        <div class="item">heart: calm</div>
        <div class="item">comfort.exe: active</div>
        <div class="item">environment: safe</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
