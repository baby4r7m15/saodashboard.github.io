<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>middaypuppy.exe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="/css/middaypuppy-bio.css" />
<link rel="icon" href="/images/puppyboypfp.png" />
<meta name="theme-color" content="#fff3f8" />

</head>

<body>

<div class="overlay overlay-particles"></div>

<header class="hud-top">
  <div class="hud-brand">
    <div class="hud-title" id="siteTitle">middaypuppy.exe</div>
    <div class="hud-sub" id="siteSubtitle"></div>
  </div>

  <nav class="hud-nav" id="siteNav"></nav>
  <div class="hud-stats" id="topStats"></div>
</header>

<main class="grid">

<section class="panel profile">
  <div class="panel-head">
    <span>USER PROFILE</span>
    <span class="chip">ONLINE</span>
  </div>

  <div class="avatar">
    <img id="avatarImg" class="avatar-img" src="/images/puppyboypfp.png" />
  </div>

  <div class="profile-name" id="profileName"></div>
  <div class="profile-meta" id="profileMeta"></div>

  <div class="bars" id="profileBars"></div>

  <div class="divider"></div>

  <div class="mini-title">LOADOUT</div>
  <ul class="list" id="loadoutList"></ul>
</section>

<section class="panel quest">
  <div class="panel-head">
    <span>BIO LOG</span>
    <span class="chip pink">LIVE</span>
  </div>

  <ul class="quests" id="bioLogList"></ul>

  <div class="divider"></div>

  <div class="mini-title">VIBES</div>
  <div class="chips-row" id="vibesList"></div>
</section>

<section class="panel party">
  <div class="panel-head">
    <span>Stats</span>
    <span class="chip pink">soft</span>
  </div>

  <div id="statsCards"></div>
</section>

<section class="panel battle">
  <div class="panel-head">
    <span>STATUS REPORT</span>
    <span class="chip">CURRENT</span>
  </div>

  <ul class="list" id="statusReportList"></ul>
</section>

<section class="panel syslog">
  <div class="panel-head">
    <span>SYSTEM LOG</span>
    <span class="chip pink">RUNNING</span>
  </div>

  <div class="terminal" id="systemLogLines"></div>
</section>

</main>

<!-- TOAST -->
<div id="toast" class="sao-toast">
  <div class="sao-toast-header">SYSTEM</div>

  <div class="sao-toast-body">
    <span id="toastType"></span><span class="caret"></span>
  </div>

  <div class="sao-toast-progress"></div>

  <button class="sao-toast-close">×</button>
</div>

  <script>
const DATA_URL = "/data/middaypuppy.json";

/* ------------------ THEME ------------------ */
function applyTheme(theme){
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v])=>{
    root.style.setProperty(`--${k}`, v);
  });

  const meta = document.querySelector("meta[name='theme-color']");
  if(meta && theme.themeColor){
    meta.setAttribute("content", theme.themeColor);
  }
}

/* ------------------ HELPERS ------------------ */
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function setHTML(id,v){const el=document.getElementById(id);if(el)el.innerHTML=v;}

/* ------------------ HEADER ------------------ */
function renderNav(nav){
  const el=document.getElementById("siteNav");
  el.innerHTML="";
  nav.forEach(n=>{
    el.innerHTML += `
      <a class="hud-link ${n.active?"active":""}" href="${n.href}">
        ${n.label}
      </a>`;
  });
}

function renderTopStats(stats){
  const el=document.getElementById("topStats");
  el.innerHTML="";
  stats.forEach(s=>{
    el.innerHTML += `<div class="stat">${s.label}: <b>${s.value}</b></div>`;
  });
}

/* ------------------ PROFILE ------------------ */
function renderBars(bars){
  const el=document.getElementById("profileBars");
  el.innerHTML="";

  bars.forEach((b,i)=>{
    const wrap=document.createElement("div");
    wrap.className="bar-wrap";

    wrap.innerHTML=`
      <div class="bar-label">${b.label}</div>
      <div class="bar">
        <div class="fill" style="width:0%"></div>
      </div>
      <div class="bar-value">${b.value}</div>
    `;

    el.appendChild(wrap);

    /* animate fill */
    setTimeout(()=>{
      wrap.querySelector(".fill").style.width = b.percent + "%";
    }, 150 + i*120);
  });
}

/* ------------------ LISTS ------------------ */
function renderList(id,items){
  const el=document.getElementById(id);
  el.innerHTML="";
  items.forEach(i=>{
    const li=document.createElement("li");
    li.textContent=i;
    el.appendChild(li);
  });
}

function renderBio(entries){
  const el=document.getElementById("bioLogList");
  el.innerHTML="";
  entries.forEach(e=>{
    el.innerHTML += `
      <li>
        <span class="q-dot"></span>
        ${e.text}
        <span class="tag ${e.tagClass||""}">${e.tag}</span>
      </li>`;
  });
}

function renderVibes(vibes){
  const el=document.getElementById("vibesList");
  el.innerHTML="";
  vibes.forEach(v=>{
    el.innerHTML += `<span class="soft-chip">${v}</span>`;
  });
}

/* ------------------ STATS ------------------ */
function renderStats(cards){
  const el=document.getElementById("statsCards");
  el.innerHTML="";
  cards.forEach(c=>{
    el.innerHTML += `
      <div class="member">
        <div class="m-name">${c.name}</div>
        <div class="m-bar">
          <div class="m-fill" style="width:${c.percent}%"></div>
        </div>
        <div class="m-sub">${c.subtext}</div>
      </div>`;
  });
}

/* ------------------ LOG ------------------ */
function renderLog(lines){
  const el=document.getElementById("systemLogLines");
  el.innerHTML="";
  lines.forEach(l=>{
    if(l.type==="gap"){
      el.innerHTML += `<div class="term-gap"></div>`;
      return;
    }
    el.innerHTML += `
      <div class="term-line">
        <span class="term-time">${l.time}</span>
        ${l.message}
      </div>`;
  });
}

/* ------------------ TOAST ------------------ */
function runTypingToast(line){
  const el=document.getElementById("toastType");
  let i=0;
  function type(){
    el.textContent=line.slice(0,i++);
    if(i<=line.length) setTimeout(type,18);
  }
  type();
}

function setupToast(){
  const toast = document.getElementById("toast");
  if(!toast) return;

  const close = toast.querySelector(".sao-toast-close");
  const progress = toast.querySelector(".sao-toast-progress");

  /* ✅ SHOW TOAST */
  requestAnimationFrame(() => {
    toast.classList.add("show");
  });

  /* ✅ SAFE PROGRESS (won’t crash if missing) */
  if(progress){
    progress.style.animation = "toastTimer 8s linear forwards";
  }

  /* ✅ AUTO CLOSE */
  const timer = setTimeout(()=>{
    toast.classList.remove("show");
    setTimeout(()=>toast.remove(),300);
  },8000);

  /* ✅ CLOSE BUTTON FIX */
  if(close){
    close.onclick = () => {
      clearTimeout(timer);
      toast.classList.remove("show");
      setTimeout(()=>toast.remove(),300);
    };
  }
}

/* ------------------ INIT ------------------ */
fetch(DATA_URL).then(r=>r.json()).then(data=>{

  /* THEME */
  if(data.theme) applyTheme(data.theme);

  /* HEADER */
  setText("siteTitle",data.header.title);
  setText("siteSubtitle",data.header.subtitle);
  renderNav(data.header.nav);
  renderTopStats(data.header.stats);

  /* PROFILE */
  setText("profileName",data.profile.name);
  setHTML("profileMeta",data.profile.metaHtml);

  if(data.profile.avatar?.src){
    document.getElementById("avatarImg").src = data.profile.avatar.src;
  }

  renderBars(data.profile.bars);
  renderList("loadoutList",data.profile.loadout);

  /* BIO */
  renderBio(data.bio.entries);
  renderVibes(data.bio.vibes);

  /* STATS */
  renderStats(data.statsPanel.cards);

  /* STATUS */
  renderList("statusReportList",data.statusReport.items);

  /* LOG */
  renderLog(data.systemLog.lines);

  /* TOAST */
  runTypingToast(data.toast.line);
  setupToast();

});
</script>
  
</body>
</html>
