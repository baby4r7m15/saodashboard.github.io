<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>middaypuppy.exe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" sizes="512x512" href="/images/puppyboypfp.png" />
<link rel="apple-touch-icon" href="/images/puppyboypfp.png" />
<meta name="theme-color" content="#fff0f7" id="themeColorMeta" />
<link rel="stylesheet" href="/css/middaypuppy-bio.css">

</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header-card">
    <div>
      <div class="header-title">middaypuppy.exe</div>
      <div class="header-sub">warm sunlight puppy</div>
    </div>

    <div class="header-right">
      <a href="/day/middaypuppy" class="nav-pill active">bio</a>
      <a href="/day/links" class="nav-pill">links</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="card">

    <!-- PROFILE -->
    <div class="profile">
  <img src="/images/puppyboypfp.png">
  <!-- MINI HUD -->
  <div class="profile-hud">

    <div class="status-line">☀ currently: enjoying soft sunlight</div>

    <div class="mini-pills">
      <span>☁ soft</span>
      <span>☀ warm</span>
      <span>♡ happy</span>
    </div>
  </div>
</div>

    <!-- CONTENT -->
    <div class="content">

      <!-- BIO -->
      <div class="section full" id="bio">
        <div class="title">Bio</div>
        <div class="list">
  <div class="item">Artemis • 21 • gentle puppy boy ☁</div>
  <div class="item">collecting warmth, comfort, and quiet moments</div>
</div>
      </div>

      <!-- OUTFIT -->
      <div class="section">
        <div class="title">Outfit</div>
        <div class="list">
          <div class="item">oversized pastel hoodie</div>
          <div class="item">soft shorts & fluffy socks</div>
        </div>
      </div>

      <!-- HOBBIES -->
      <div class="section" id="vibes">
        <div class="title">Hobbies</div>
        <div class="list">
          <div class="item">gaming</div>
          <div class="item">listening to music</div>
        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
